<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subir Libro — Biblioteca Virtual</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">📚 Biblioteca Virtual</div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Inicio</a>
      <a href="books.html" class="nav-link">Gestionar Libros</a>
      <a href="upload.html" class="nav-link active">Subir Libro</a>
      <button class="btn btn-outline btn-sm" id="logout-btn">Cerrar Sesión</button>
    </div>
    <button class="nav-toggle" id="nav-toggle">☰</button>
  </nav>

  <main class="container">
    <div class="page-header">
      <h2>Subir Nuevo Libro</h2>
    </div>

    <div id="upload-alert" class="alert hidden"></div>

    <div class="upload-card">
      <div class="form-group">
        <label for="title">Título <span class="required">*</span></label>
        <input type="text" id="title" placeholder="Ej: Cien Años de Soledad" />
      </div>
      <div class="form-group">
        <label for="author">Autor <span class="required">*</span></label>
        <input type="text" id="author" placeholder="Ej: Gabriel García Márquez" />
      </div>
      <div class="form-group">
        <label for="pub-date">Fecha de Publicación</label>
        <input type="date" id="pub-date" />
      </div>
      <div class="form-group">
        <label for="synopsis">Sinopsis</label>
        <textarea id="synopsis" rows="5" placeholder="Descripción breve del libro..."></textarea>
      </div>
      <div class="form-group">
        <label for="cover">Portada (imagen)</label>
        <div class="file-drop" id="cover-drop">
          <span>📷 Arrastra una imagen o haz clic para seleccionar</span>
          <input type="file" id="cover" accept="image/*" hidden />
        </div>
        <img id="cover-preview" class="img-preview hidden" alt="Vista previa de portada" />
      </div>
      <div class="form-group">
        <label for="pdf">Archivo PDF <span class="required">*</span></label>
        <div class="file-drop" id="pdf-drop">
          <span>📄 Arrastra un PDF o haz clic para seleccionar</span>
          <input type="file" id="pdf" accept="application/pdf" hidden />
        </div>
        <p id="pdf-name" class="file-name hidden"></p>
      </div>
      <button class="btn btn-primary btn-full" id="upload-btn">📤 Subir Libro</button>
    </div>
  </main>
  <script src="../js/upload.js"></script>
</body>
</html>
