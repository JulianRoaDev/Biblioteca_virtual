<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestionar Libros — Biblioteca Virtual</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">📚 Biblioteca Virtual</div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Inicio</a>
      <a href="books.html" class="nav-link active">Gestionar Libros</a>
      <a href="upload.html" class="nav-link">Subir Libro</a>
      <button class="btn btn-outline btn-sm" id="logout-btn">Cerrar Sesión</button>
    </div>
    <button class="nav-toggle" id="nav-toggle">☰</button>
  </nav>

  <main class="container">
    <div class="page-header">
      <h2>Gestionar Libros</h2>
      <a href="upload.html" class="btn btn-primary">+ Nuevo Libro</a>
    </div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍 Buscar por título o autor..." />
    </div>

    <div class="books-table-wrapper">
      <table class="books-table">
        <thead>
          <tr>
            <th>Portada</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Fecha de Publicación</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="books-tbody">
          <tr><td colspan="5" class="loading-text">Cargando libros...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal de edición -->
  <div class="modal-overlay hidden" id="edit-modal">
    <div class="modal">
      <h3>Editar Libro</h3>
      <input type="hidden" id="edit-id" />
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="edit-title" />
      </div>
      <div class="form-group">
        <label>Autor</label>
        <input type="text" id="edit-author" />
      </div>
      <div class="form-group">
        <label>Fecha de Publicación</label>
        <input type="date" id="edit-date" />
      </div>
      <div class="form-group">
        <label>Sinopsis</label>
        <textarea id="edit-synopsis" rows="4"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="modal-cancel">Cancelar</button>
        <button class="btn btn-primary" id="modal-save">Guardar Cambios</button>
      </div>
    </div>
  </div>

  <script src="../js/books.js"></script>
</body>
</html>
