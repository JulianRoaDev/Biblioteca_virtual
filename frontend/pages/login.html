<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca Virtual — Iniciar Sesión</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">📚</div>
    <h1 class="auth-title">Biblioteca Virtual</h1>
    <p class="auth-subtitle">Panel de Administrador</p>

    <div id="error-msg" class="alert alert-error hidden"></div>

    <div class="form-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary btn-full" id="login-btn">Iniciar Sesión</button>
  </div>
  <script src="../js/auth.js"></script>
</body>
</html>
